     inkscape:zoom="1.4907895"
     inkscape:cx="650.32657"
     inkscape:cy="165.34863"
     inkscape:window-width="2560"
     inkscape:window-height="1351"
     inkscape:window-x="-9"
     inkscape:window-y="-9"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg51" />
  <title
     id="title1">Orbit — C3 Component Diagram (Cross-Cutting Flows)</title>
  <desc
     id="desc1">Kafka fan-out, WebSocket delivery, and external client wrapper flows shown separately from the standard layered view</desc>
  <defs
     id="defs3">
    <marker
       id="arrow-orange"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="#B45309"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path1" />
    </marker>
    <marker
       id="arrow-purple"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="#534AB7"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path2" />
    </marker>
    <marker
       id="arrow-grey"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="#888780"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path3" />
    </marker>
    <style
       id="style3">
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #3d3d3a; }
    .th  { font-size: 13.5px; font-weight: 700; }
    .ts  { font-size: 11px; font-weight: 400; }
    .tl  { font-size: 10px; font-weight: 400; fill: #5F5E5A; font-style: italic; }
    .section-label { font-size: 11px; font-weight: 700; fill: #888780; letter-spacing: 1.2px; }
    .step-num { font-size: 12px; font-weight: 700; fill: #FFFFFF; }

    .svc-box   { fill: #9FE1CB; stroke: #0F6E56; stroke-width: 1.3; }
    .svc-txt   { fill: #042D24; }
    .infra-box { fill: #FCEFD9; stroke: #B45309; stroke-width: 1.3; }
    .infra-txt { fill: #6B3A04; }
    .client-box{ fill: #EEEDFE; stroke: #534AB7; stroke-width: 1.3; }
    .client-txt{ fill: #3C3489; }
    .ext-box   { fill: #F4F3F0; stroke: #888780; stroke-width: 1.1; }
    .ext-txt   { fill: #3d3d3a; }

    .flow-kafka  { stroke: #B45309; stroke-width: 1.4; fill: none; }
    .flow-client { stroke: #534AB7; stroke-width: 1.4; fill: none; }
    .flow-ext    { stroke: #888780; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; }
    .step-circle-kafka  { fill: #B45309; }
    .step-circle-client { fill: #534AB7; }
  </style>
  </defs>
  <rect
     x="20"
     y="20"
     width="1260"
     height="720"
     rx="12"
     fill="none"
     stroke="#D8D6CF"
     stroke-width="1"
     stroke-dasharray="10 5"
     id="rect3" />
  <text
     class="section-label"
     x="40"
     y="44"
     id="text3">C3 — CROSS-CUTTING FLOWS  (2 of 2)  ·  Kafka fan-out, WebSocket delivery, external client wrappers</text>
  <text
     class="tl"
     x="40"
     y="62"
     id="text4">Numbered steps show the order of calls for each flow. See c3_component_layers.svg for the standard layered view.</text>
  <!-- ══════════════════════════════════════════
     FLOW A — KAFKA FAN-OUT  (top half)
══════════════════════════════════════════ -->
  <text
     class="section-label"
     x="40"
     y="106"
     id="text5">FLOW A — MESSAGE SEND → KAFKA FAN-OUT → WEBSOCKET DELIVERY</text>
  <rect
     x="40"
     y="118"
     width="190"
     height="70"
     rx="8"
     class="svc-box"
     id="rect5" />
  <text
     class="th svc-txt"
     x="135"
     y="148"
     text-anchor="middle"
     id="text6">MessageService</text>
  <text
     class="tl"
     x="135"
     y="166"
     text-anchor="middle"
     id="text7">persists to MongoDB first</text>
  <rect
     x="320"
     y="118"
     width="190"
     height="70"
     rx="8"
     class="infra-box"
     id="rect7" />
  <text
     class="th infra-txt"
     x="415"
     y="148"
     text-anchor="middle"
     id="text8">KafkaProducerConfig</text>
  <text
     class="tl"
     x="415"
     y="166"
     text-anchor="middle"
     id="text9">publishes chat.messages event</text>
  <rect
     x="600"
     y="118"
     width="190"
     height="70"
     rx="8"
     class="ext-box"
     id="rect9" />
  <text
     class="th ext-txt"
     x="695"
     y="148"
     text-anchor="middle"
     id="text10">Upstash Kafka</text>
  <text
     class="tl"
     x="695"
     y="166"
     text-anchor="middle"
     id="text11">delivers to all instances</text>
  <rect
     x="880"
     y="118"
     width="190"
     height="70"
     rx="8"
     class="infra-box"
     id="rect11" />
  <text
     class="th infra-txt"
     x="975"
     y="148"
     text-anchor="middle"
     id="text12">KafkaConsumerConfig</text>
  <text
     class="tl"
     x="975"
     y="166"
     text-anchor="middle"
     id="text13">checks local session registry</text>
  <line
     x1="230"
     y1="153"
     x2="320"
     y2="153"
     class="flow-kafka"
     marker-end="url(#arrow-orange)"
     id="line14" />
  <!-- step 1 -->
  <circle
     cx="270"
     cy="153"
     r="13"
     class="step-circle-kafka"
     id="circle13" />
  <text
     class="step-num"
     x="270"
     y="158"
     text-anchor="middle"
     id="text14">1</text>
  <!-- step 2 -->
  <line
     x1="510"
     y1="153"
     x2="600"
     y2="153"
     class="flow-kafka"
     marker-end="url(#arrow-orange)"
     id="line15" />
  <circle
     cx="550"
     cy="153"
     r="13"
     class="step-circle-kafka"
     id="circle14" />
  <text
     class="step-num"
     x="550"
     y="158"
     text-anchor="middle"
     id="text15">2</text>
  <!-- step 3 -->
  <line
     x1="790"
     y1="153"
     x2="880"
     y2="153"
     class="flow-kafka"
     marker-end="url(#arrow-orange)"
     id="line16" />
  <circle
     cx="830"
     cy="153"
     r="13"
     class="step-circle-kafka"
     id="circle15" />
  <text
     class="step-num"
     x="830"
     y="158"
     text-anchor="middle"
     id="text16">3</text>
  <!-- step 4: down to WebSocketConfig -->
  <rect
     x="880"
     y="232"
     width="190"
     height="70"
     rx="8"
     class="infra-box"
     id="rect16" />
  <text
     class="th infra-txt"
     x="975"
     y="262"
     text-anchor="middle"
     id="text17">WebSocketConfig</text>
  <text
     class="tl"
     x="975"
     y="280"
     text-anchor="middle"
     id="text18">delivers to matching session(s)</text>
  <line
     x1="975"
     y1="188"
     x2="975"
     y2="232"
     class="flow-kafka"
     marker-end="url(#arrow-orange)"
     id="line19" />
  <circle
     cx="975"
     cy="210"
     r="13"
     class="step-circle-kafka"
     id="circle18" />
  <text
     class="step-num"
     x="975"
     y="215"
     text-anchor="middle"
     id="text19">4</text>
  <!-- step 5: out to client over WSS -->
  <rect
     x="600"
     y="232"
     width="190"
     height="70"
     rx="8"
     class="ext-box"
     id="rect19" />
  <text
     class="th ext-txt"
     x="695"
     y="262"
     text-anchor="middle"
     id="text20">React SPA (recipient)</text>
  <text
     class="tl"
     x="695"
     y="280"
     text-anchor="middle"
     id="text21">receives over WSS / STOMP</text>
  <line
     x1="880"
     y1="267"
     x2="790"
     y2="267"
     class="flow-kafka"
     marker-end="url(#arrow-orange)"
     id="line22" />
  <circle
     cx="830"
     cy="267"
     r="13"
     class="step-circle-kafka"
     id="circle21" />
  <text
     class="step-num"
     x="830"
     y="272"
     text-anchor="middle"
     id="text22">5</text>
  <text
     class="tl"
     x="40"
     y="340"
     id="text23">If this instance holds no matching WebSocket session for the event, KafkaConsumerConfig discards it silently — another instance will hold it.</text>
  <text
     class="tl"
     x="40"
     y="358"
     id="text24">This is the mechanism documented in discussions/002_websocket_scaling.md that makes the monolith horizontally scalable without code changes.</text>
  <!-- divider -->
  <line
     x1="40"
     y1="396"
     x2="1260"
     y2="396"
     stroke="#D8D6CF"
     stroke-width="1"
     id="line24" />
  <!-- ══════════════════════════════════════════
     FLOW B — EXTERNAL CLIENT WRAPPERS  (bottom half)
══════════════════════════════════════════ -->
  <text
     class="section-label"
     x="40"
     y="430"
     id="text25">FLOW B — EXTERNAL CLIENT WRAPPER CALLS  (file upload + AI request, shown independently — not sequential to each other)</text>
  <!-- B1: File upload path -->
  <rect
     x="40"
     y="448"
     width="180"
     height="64"
     rx="8"
     class="svc-box"
     id="rect25" />
  <text
     class="th svc-txt"
     x="130"
     y="474"
     text-anchor="middle"
     id="text26">MessageService</text>
  <text
     class="tl"
     x="130"
     y="492"
     text-anchor="middle"
     id="text27">or UserService / GroupService</text>
  <rect
     x="300"
     y="448"
     width="180"
     height="64"
     rx="8"
     class="client-box"
     id="rect27" />
  <text
     class="th client-txt"
     x="390"
     y="474"
     text-anchor="middle"
     id="text28">R2StorageClient</text>
  <text
     class="tl"
     x="390"
     y="492"
     text-anchor="middle"
     id="text29">AWS S3 SDK wrapper</text>
  <rect
     x="560"
     y="448"
     width="180"
     height="64"
     rx="8"
     class="ext-box"
     id="rect29" />
  <text
     class="th ext-txt"
     x="650"
     y="474"
     text-anchor="middle"
     id="text30">Cloudflare R2</text>
  <text
     class="tl"
     x="650"
     y="492"
     text-anchor="middle"
     id="text31">stores object, returns key</text>
  <line
     x1="220"
     y1="480"
     x2="300"
     y2="480"
     class="flow-client"
     marker-end="url(#arrow-purple)"
     id="line32" />
  <circle
     cx="260"
     cy="480"
     r="13"
     class="step-circle-client"
     id="circle31" />
  <text
     class="step-num"
     x="260"
     y="485"
     text-anchor="middle"
     id="text32">1</text>
  <line
     x1="480"
     y1="480"
     x2="560"
     y2="480"
     class="flow-ext"
     marker-end="url(#arrow-grey)"
     id="line33" />
  <circle
     cx="520"
     cy="480"
     r="13"
     class="step-circle-client"
     id="circle32" />
  <text
     class="step-num"
     x="520"
     y="485"
     text-anchor="middle"
     id="text33">2</text>
  <text
     class="tl"
     x="40"
     y="534"
     id="text34">Response carries a presigned URL (1-hour expiry) — stored on the message, user, or group document by the calling service.</text>
  <!-- B2: AI request path -->
  <rect
     x="40"
     y="568"
     width="180"
     height="64"
     rx="8"
     class="svc-box"
     id="rect34" />
  <text
     class="th svc-txt"
     x="130"
     y="594"
     text-anchor="middle"
     id="text35">AiService</text>
  <text
     class="tl"
     x="130"
     y="612"
     text-anchor="middle"
     id="text36">Phase 4 only</text>
  <rect
     x="300"
     y="568"
     width="180"
     height="64"
     rx="8"
     class="client-box"
     id="rect36" />
  <text
     class="th client-txt"
     x="390"
     y="594"
     text-anchor="middle"
     id="text37">ClaudeApiClient</text>
  <text
     class="tl"
     x="390"
     y="612"
     text-anchor="middle"
     id="text38">HTTPS wrapper</text>
  <rect
     x="560"
     y="568"
     width="180"
     height="64"
     rx="8"
     class="ext-box"
     id="rect38" />
  <text
     class="th ext-txt"
     x="650"
     y="594"
     text-anchor="middle"
     id="text39">Claude API</text>
  <text
     class="tl"
     x="650"
     y="612"
     text-anchor="middle"
     id="text40">returns completion</text>
  <line
     x1="220"
     y1="600"
     x2="300"
     y2="600"
     class="flow-client"
     marker-end="url(#arrow-purple)"
     id="line41" />
  <circle
     cx="260"
     cy="600"
     r="13"
     class="step-circle-client"
     id="circle40" />
  <text
     class="step-num"
     x="260"
     y="605"
     text-anchor="middle"
     id="text41">1</text>
  <line
     x1="480"
     y1="600"
     x2="560"
     y2="600"
     class="flow-ext"
     marker-end="url(#arrow-grey)"
     id="line42" />
  <circle
     cx="520"
     cy="600"
     r="13"
     class="step-circle-client"
     id="circle41" />
  <text
     class="step-num"
     x="520"
     y="605"
     text-anchor="middle"
     id="text42">2</text>
  <text
     class="tl"
     x="40"
     y="654"
     id="text43">Response is parsed by AiService and broadcast as a bot message via the same Kafka → WebSocket fan-out path shown in Flow A above.</text>
  <!-- LEGEND -->
  <rect
     x="850"
     y="448"
     width="370"
     height="184"
     rx="8"
     fill="#FAFAF8"
     stroke="#D8D6CF"
     stroke-width="0.8"
     id="rect43" />
  <text
     class="section-label"
     x="870"
     y="472"
     id="text44">LEGEND</text>
  <rect
     x="870"
     y="486"
     width="16"
     height="13"
     rx="3"
     class="svc-box"
     stroke-width="1.3"
     id="rect44" />
  <text
     class="ts"
     x="894"
     y="497"
     id="text45">Service</text>
  <rect
     x="870"
     y="506"
     width="16"
     height="13"
     rx="3"
     class="infra-box"
     stroke-width="1.3"
     id="rect45" />
  <text
     class="ts"
     x="894"
     y="517"
     id="text46">Cross-cutting infra</text>
  <rect
     x="870"
     y="526"
     width="16"
     height="13"
     rx="3"
     class="client-box"
     stroke-width="1.3"
     id="rect46" />
  <text
     class="ts"
     x="894"
     y="537"
     id="text47">External client wrapper</text>
  <rect
     x="870"
     y="546"
     width="16"
     height="13"
     rx="3"
     class="ext-box"
     stroke-width="1.1"
     id="rect47" />
  <text
     class="ts"
     x="894"
     y="557"
     id="text48">External system / recipient</text>
  <line
     x1="870"
     y1="574"
     x2="906"
     y2="574"
     stroke="#B45309"
     stroke-width="1.4"
     marker-end="url(#arrow-orange)"
     id="line48" />
  <text
     class="ts"
     x="914"
     y="578"
     id="text49">Kafka fan-out step</text>
  <line
     x1="870"
     y1="594"
     x2="906"
     y2="594"
     stroke="#534AB7"
     stroke-width="1.4"
     marker-end="url(#arrow-purple)"
     id="line49" />
  <text
     class="ts"
     x="914"
     y="598"
     id="text50">Client wrapper call</text>
  <line
     x1="870"
     y1="614"
     x2="906"
     y2="614"
     stroke="#888780"
     stroke-width="1.2"
     stroke-dasharray="5 3"
     marker-end="url(#arrow-grey)"
     id="line50" />
  <text
     class="ts"
     x="914"
     y="618"
     id="text51">External system call</text>
</svg>
